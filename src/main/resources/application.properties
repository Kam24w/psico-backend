# =============================================
# PSICO VIRTUAL - APPLICATION PROPERTIES
# =============================================

spring.application.name=psico-backend

# --- BASE DE DATOS (MySQL / Railway) ---
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/psicodb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
jwt.secret=${JWT_SECRET:psico-virtual-secret-key-2024-muy-segura-32chars}
jwt.expiration=86400000

# --- GEMINI (Google AI) ---
gemini.api.key=${GEMINI_API_KEY:tu-api-key-aqui}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# --- SERVIDOR ---
server.port=${PORT:8080}

# --- CORS ---
cors.allowed.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# --- LOGGING ---
logging.level.com.psico=DEBUG
logging.level.org.springframework.security=INFO
