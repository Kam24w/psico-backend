# PSICO VIRTUAL - APPLICATION PROPERTIES

spring.application.name=psico-backend

# --- BASE DE DATOS (PostgreSQL / Supabase) ---
# Usamos variables de entorno para que en Railway sea fácil de configurar
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.TU_ID_SUPABASE.supabase.co:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:TU_CONTRASEÑA_DE_SUPABASE}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# IMPORTANTE: Cambiamos el dialecto a PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- JWT ---
jwt.secret=${JWT_SECRET:psico-virtual-secret-key-2024-muy-segura-32chars}
jwt.expiration=86400000

# --- GEMINI (Google AI) ---
gemini.api.key=${GEMINI_API_KEY}
gemini.api.model=${GEMINI_MODEL:gemma-4-26b-a4b-it}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/${gemini.api.model}:generateContent

# --- SERVIDOR ---
server.port=${PORT:8080}

# --- LOGGING ---
logging.level.com.psico=INFO
logging.level.org.springframework.security=WARN